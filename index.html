<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scuderia Littel</title>
  <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(to bottom, #ffffff, #89cff0);
      color: #1a1a1a;
      font-family: 'Michroma', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
    }

    nav {
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 48px;
      margin-bottom: 40px;
    }

    nav a {
      text-decoration: none;
      color: #1a1a1a;
      font-family: 'Michroma', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    nav a:hover {
      text-decoration: underline;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: bold;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #1a1a1a;
      margin-bottom: 40px;
      text-align: center;
    }

    .slideshow {
      max-width: 900px;
      width: 100%;
      position: relative;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.1);
    }

    .slideshow img {
      width: 100%;
      height: auto;
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }

    .slideshow img.active {
      opacity: 1;
      position: relative;
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 16px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #ccc;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .dot.active {
      background-color: #1a1a1a;
    }

    .lines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    nav, h1, .slideshow, .dots {
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>
  <svg class="lines" viewBox="0 0 1440 900" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Gold racing lines -->
    <path d="M0,0 Q400,300 900,400 T1600,600" stroke="#d4a017" stroke-width="5" fill="none" opacity="0.7"/>
    <path d="M0,0 Q300,500 600,700 T900,900" stroke="#d4a017" stroke-width="3.5" fill="none" opacity="0.5"/>
    <path d="M0,0 Q600,100 1000,350 T1440,250" stroke="#d4a017" stroke-width="2.5" fill="none" opacity="0.35"/>
    <!-- Blue racing lines -->
    <path d="M0,0 Q500,200 1100,150 T1440,500" stroke="#89cff0" stroke-width="5" fill="none" opacity="0.7"/>
    <path d="M0,0 Q200,400 700,600 T1200,900" stroke="#89cff0" stroke-width="3.5" fill="none" opacity="0.5"/>
    <path d="M0,0 Q700,400 1300,300 T1440,800" stroke="#89cff0" stroke-width="2.5" fill="none" opacity="0.35"/>
    <!-- Black racing lines -->
    <path d="M0,0 Q350,250 800,200 T1440,450" stroke="#1a1a1a" stroke-width="4" fill="none" opacity="0.18"/>
    <path d="M0,0 Q250,600 800,750 T1100,900" stroke="#1a1a1a" stroke-width="3" fill="none" opacity="0.12"/>
  </svg>

  <nav>
    <a href="https://instagram.com/scuderialittel" target="_blank">Follow Us</a>
    <a href="team.html">Team</a>
  </nav>
  <h1>Scuderia Littel</h1>
  <div class="slideshow" id="slideshow">
    <img src="IMG_3279.jpeg" alt="Karting photo 1" class="active" />
    <img src="IMG_3281.jpeg" alt="Karting photo 2" />
    <img src="IMG_3282.jpeg" alt="Karting photo 3" />
    <img src="IMG_3284.jpeg" alt="Karting photo 4" />
    <img src="IMG_3287.jpeg" alt="Karting photo 5" />
  </div>
  <div class="dots" id="dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <script>
    const images = document.querySelectorAll('.slideshow img');
    const dots = document.querySelectorAll('.dot');
    let current = 0;

    function goTo(index) {
      images[current].classList.remove('active');
      dots[current].classList.remove('active');
      current = index % images.length;
      images[current].classList.add('active');
      dots[current].classList.add('active');
    }

    dots.forEach((dot, i) => dot.addEventListener('click', () => goTo(i)));

    setInterval(() => goTo(current + 1), 3000);
  </script>
</body>
</html>
