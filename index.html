<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Karting by Aurora</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0d0d0d;
      color: #f0f0f0;
      font-family: 'Georgia', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
    }

    h1 {
      font-size: 2.4rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #e8e8e8;
      margin-bottom: 40px;
      text-align: center;
    }

    .photo-container {
      max-width: 900px;
      width: 100%;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.7);
    }

    .photo-container img {
      width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>
  <h1>Karting by Aurora</h1>
  <div class="photo-container">
    <img src="IMG_3279.jpeg" alt="Karting by Aurora" />
  </div>
</body>
</html>
