<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Karting by Aurora</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #ffffff;
      color: #1a1a1a;
      font-family: 'Georgia', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
    }

    h1 {
      font-size: 2.4rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #1a1a1a;
      margin-bottom: 40px;
      text-align: center;
    }

    .photo-container {
      max-width: 900px;
      width: 100%;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.1);
    }

    nav {
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 48px;
      margin-bottom: 40px;
    }

    nav a {
      text-decoration: none;
      color: #1a1a1a;
      font-family: 'Georgia', serif;
      font-size: 1rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .photo-container img {
      width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>
  <nav>
    <a href="https://instagram.com/aurora.got.aura2" target="_blank">About Me</a>
    <a href="https://gfckarting.com" target="_blank">Store</a>
  </nav>
  <h1>Karting by Aurora</h1>
  <div class="photo-container">
    <img src="IMG_3279.jpeg" alt="Karting by Aurora" />
  </div>
</body>
</html>
