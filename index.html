<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scuderia Littel</title>
  <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(to bottom, #ffffff, #89cff0);
      color: #1a1a1a;
      font-family: 'Michroma', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
    }

    nav {
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 48px;
      margin-bottom: 40px;
    }

    nav a {
      text-decoration: none;
      color: #1a1a1a;
      font-family: 'Michroma', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    nav a:hover {
      text-decoration: underline;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: bold;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #1a1a1a;
      margin-bottom: 40px;
      text-align: center;
    }

    .slideshow {
      max-width: 900px;
      width: 100%;
      position: relative;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.1);
    }

    .slideshow img {
      width: 100%;
      height: auto;
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }

    .slideshow img.active {
      opacity: 1;
      position: relative;
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 16px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #ccc;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .dot.active {
      background-color: #1a1a1a;
    }
  </style>
</head>
<body>
  <nav>
    <a href="https://instagram.com/scuderialittel" target="_blank">Follow Us</a>
    <a href="https://gfckarting.com" target="_blank">Store</a>
  </nav>
  <h1>Scuderia Littel</h1>
  <div class="slideshow" id="slideshow">
    <img src="IMG_3279.jpeg" alt="Karting photo 1" class="active" />
    <img src="IMG_3281.jpeg" alt="Karting photo 2" />
    <img src="IMG_3282.jpeg" alt="Karting photo 3" />
    <img src="IMG_3284.jpeg" alt="Karting photo 4" />
    <img src="IMG_3287.jpeg" alt="Karting photo 5" />
  </div>
  <div class="dots" id="dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <script>
    const images = document.querySelectorAll('.slideshow img');
    const dots = document.querySelectorAll('.dot');
    let current = 0;

    function goTo(index) {
      images[current].classList.remove('active');
      dots[current].classList.remove('active');
      current = index % images.length;
      images[current].classList.add('active');
      dots[current].classList.add('active');
    }

    dots.forEach((dot, i) => dot.addEventListener('click', () => goTo(i)));

    setInterval(() => goTo(current + 1), 3000);
  </script>
</body>
</html>
